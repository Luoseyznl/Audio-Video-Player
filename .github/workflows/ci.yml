name: C/C++ CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          libavcodec-dev \
          libavformat-dev \
          libavutil-dev \
          libswscale-dev \
          libswresample-dev \
          libsdl2-dev \
          libglfw3-dev \
          libglew-dev \
          libgl1-mesa-dev \
          xvfb

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release -j $(nproc)

    - name: Run Tests
      run: |
        cd build
        xvfb-run ctest --output-on-failure